# Skill Manifest — SCHEMA + EXAMPLE (documentation only).
#
# IMPORTANT:
# - This schema is NOT wired to runtime. No loader reads it yet.
# - `runtime_enabled` MUST default to false.
# - `status: approved` is required before ANY future runtime use.
# - `approved_by` MUST be a human.
# - No skill may grant itself new permissions; permissions are set/approved by
#   a human and bounded by the permission tier (see AGENT_MODE_STANDARD.md).
#
# Fields:
name: ""
purpose: ""
status: proposed | planned | implemented | approved | deprecated
risk_level: low | medium | high | critical
permission_tier: 0                      # 0..6, see AGENT_MODE_STANDARD.md
permissions: []                         # explicit, human-approved, tier-bounded
created_by: agent | user | imported
approved_by: ""                         # MUST be a human; blank = not approved
approved_at: ""                         # ISO timestamp of human approval
source_branch: ""
source_pr: ""
tests: []                               # validation the skill must pass
protected_paths_checked: true           # protected-path scan must be applied
rollback_plan: ""                       # required: how to undo it
runtime_enabled: false                  # MUST default false; flipped by a human

# ── EXAMPLE (illustrative only; inert; runtime_enabled stays false) ───────────
# name: weekly-doc-change-summary
# purpose: "Read-only summary of docs/ changes over the last 7 days."
# status: proposed
# risk_level: low
# permission_tier: 1
# permissions: ["read:docs"]
# created_by: agent
# approved_by: ""            # not approved
# approved_at: ""
# source_branch: ""
# source_pr: ""
# tests: ["node --check server/index.js", "npm run build"]
# protected_paths_checked: true
# rollback_plan: "Delete the skill entry; no runtime state to revert."
# runtime_enabled: false
