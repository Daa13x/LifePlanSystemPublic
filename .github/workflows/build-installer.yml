# Build Installer — CI/CD pipeline for the Life Planner portable + Inno installer.
#
# STATUS: STARTING DRAFT (roadmap item "CI/CD + local installer build" is
# in-progress). This has NOT yet been validated by a real GitHub Actions run.
# A future agent must trigger it once (push to main or the manual "Run workflow"
# button), read the logs, and fix whatever the hosted runner surfaces before
# marking the roadmap item done. See docs/handoffs for the full scope.
#
# What it does: on a push to main, on a version tag, or on manual dispatch, it
# builds the web app, packages the portable one-folder bundle, compiles the Inno
# Setup installer, and uploads the results as downloadable artifacts. Tagged
# builds also attach the installer to a GitHub Release, so the user can create
# the pipeline installer "at the repo end" without a local terminal.

name: Build Installer

on:
  push:
    branches: [main]
    tags: ['*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing release tag to attach the installer to (for example: 1.0 or v1.0.0)'
        required: false
        type: string

permissions:
  contents: write # needed to attach the installer to a Release on tag builds

concurrency:
  group: build-installer-${{ github.event.release.tag_name || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.event.release.tag_name || (startsWith(github.ref, 'refs/tags/') && github.ref_name) || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      # The shared installer build script reuses the workflow's npm ci + build,
      # installs Playwright Chromium into the packaged app, and compiles the
      # Inno installer.
      - name: Build portable bundle + installer
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass -File scripts/build-installer.ps1
          -SkipDependencyInstall
          -SkipBuild

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: LifePlannerPortable
          path: release/LifePlannerPortable
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LifePlannerPortableSetup
          path: release/LifePlannerPortableSetup.exe
          if-no-files-found: error

      # Only tagged builds publish a Release asset the user can download.
      - name: Attach installer to Release
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/LifePlannerPortableSetup.exe
